name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Pin npm to the same major version used to generate the lock file (npm 11).
      # GitHub Actions bundles npm 10 with Node 20; mismatched versions cause
      # "package.json and package-lock.json are out of sync" errors with npm ci.
      - name: Pin npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      DIRECT_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      # Stub Supabase vars — only needed to pass env Zod validation; not called in tests.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run test migrations (skips Supabase-only RLS files)
        run: npm run db:migrate:test

      - name: Run integration tests
        run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: npm install -g npm@11

      # NODE_ENV intentionally omitted here — setting it to "production" causes
      # npm ci to skip devDependencies, which includes typescript (required by Next.js build).
      - name: Install dependencies
        run: npm ci

      # Stub env vars scoped to the build step only so Next.js doesn't crash on
      # missing values. No real DB is contacted during build.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          ANTHROPIC_API_KEY: sk-ant-placeholder
          OPENAI_API_KEY: sk-placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build
